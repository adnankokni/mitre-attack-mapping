title: Suspicious PowerShell Encoded Command
id: a2b4c6d8-1234-5678-abcd-ef0123456789
status: experimental
description: >
  Detects PowerShell execution with encoded commands which is commonly
  used by attackers to obfuscate malicious code. Maps to MITRE T1059.001.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: adnankokni
date: 2025/01/01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    EventID: 4688
    NewProcessName|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-EncodedCommand'
      - '-enc '
      - '-e '
  filter:
    CommandLine|contains:
      - 'Get-MpPreference'
  condition: selection and not filter
falsepositives:
  - Legitimate scripts using encoded commands
  - Software deployment tools
level: high
fields:
  - CommandLine
  - ParentProcessName
  - User
